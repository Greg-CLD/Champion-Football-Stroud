name: Fetch latest FGR video

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'

permissions:
  contents: write

jobs:
  fetch-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse YouTube RSS feed
        run: |
          python3 << 'PYTHON_SCRIPT'
          import urllib.request
          import xml.etree.ElementTree as ET
          import json
          import os
          from datetime import datetime, timezone

          RSS_URL = "https://www.youtube.com/feeds/videos.xml?channel_id=UC9hiO4pAzKontGqMaakP-Fw"

          # Fetch the RSS feed
          req = urllib.request.Request(RSS_URL, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req, timeout=30) as response:
              feed_xml = response.read().decode("utf-8")

          # Parse the XML
          root = ET.fromstring(feed_xml)

          # YouTube RSS uses Atom namespace
          ns = {
              "atom": "http://www.w3.org/2005/Atom",
              "yt": "http://www.youtube.com/xml/schemas/2015",
              "media": "http://search.yahoo.com/mrss/"
          }

          # Title-based scoring to identify match highlights
          def score_title(title):
              t = title.lower()
              s = 0
              boosts = [
                  ("extended highlights", 15),
                  ("match highlights", 15),
                  ("highlights", 10),
                  ("vs", 5),
                  ("v ", 5),
                  ("full-time", 3),
                  ("full time", 3),
                  ("goals", 3),
              ]
              penalties = [
                  ("interview", -10),
                  ("press conference", -10),
                  ("training", -8),
                  ("behind the scenes", -8),
                  ("ticket", -8),
                  ("shorts", -5),
                  ("podcast", -5),
                  ("commercial", -5),
                  ("kit launch", -5),
              ]
              for term, pts in boosts + penalties:
                  if term in t:
                      s += pts
              return s

          # Get the 5 most recent entries
          entries = root.findall("atom:entry", ns)[:5]
          if not entries:
              print("No entries found in RSS feed")
              exit(1)

          videos = []
          for entry in entries:
              video_id = entry.find("yt:videoId", ns).text
              title = entry.find("atom:title", ns).text
              published = entry.find("atom:published", ns).text
              score = score_title(title)
              videos.append({
                  "title": title,
                  "videoId": video_id,
                  "publishedAt": published,
                  "watchUrl": f"https://www.youtube.com/watch?v={video_id}",
                  "embedUrl": f"https://www.youtube-nocookie.com/embed/{video_id}",
                  "thumbnailUrl": f"https://i.ytimg.com/vi/{video_id}/hqdefault.jpg",
                  "score": score,
              })

          # Sort by score descending, then by publishedAt descending for ties
          # Two-pass stable sort: first by date (newest first), then by score
          videos.sort(key=lambda v: v["publishedAt"], reverse=True)
          videos.sort(key=lambda v: -v["score"])

          # Build the output JSON
          data = {
              "featuredVideo": videos[0],
              "videos": videos,
              "fetchedAt": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
          }

          # Write JSON file
          os.makedirs("data", exist_ok=True)
          with open("data/latest-fgr-video.json", "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write("\n")

          featured = videos[0]
          print(f"Featured: {featured['title']} (score {featured['score']})")
          for v in videos:
              print(f"  [{v['score']:+d}] {v['title']}")
          PYTHON_SCRIPT

      - name: Commit and push if changed
        run: |
          git diff --quiet data/latest-fgr-video.json && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest-fgr-video.json
          git commit -m "chore: update FGR featured video"
          git push
