<section id="jules-football-block">
    <style>
        /* ==================================================================
           JULES FOOTBALL BLOCK STYLES
           ================================================================== */
        
        #jules-football-block {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            color: #1A237E; /* Deep Navy */
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            background: #F4F7F4;
        }

        #jules-football-block * {
            box-sizing: border-box;
        }

        /* --- HERO SECTION --- */
        .jfb-hero {
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: #E8F5E9;
            overflow: hidden;
        }

        .jfb-football-decor {
            position: absolute;
            width: clamp(250px, 58vw, 520px);
            aspect-ratio: 1 / 1;
            right: -90px;
            top: -40px;
            z-index: 2;
            pointer-events: none;
            opacity: 0.85;
            background-image: url('images/colorful-football.svg');
            background-repeat: no-repeat;
            background-size: contain;
            background-position: center;
            transform: rotate(-8deg);
            filter: saturate(1.08);
        }

        .jfb-hero-img-container {
            width: 100%;
            height: 300px;
        }

        .jfb-hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .jfb-hero-content {
            background: #FFFFFF;
            padding: 2rem;
            border-radius: 16px;
            margin: -60px 1.5rem 1.5rem 1.5rem;
            position: relative;
            z-index: 10;
            box-shadow: 0 8px 24px rgba(26, 35, 126, 0.08);
        }

        .jfb-label {
            display: inline-block;
            background: #E8F5E9;
            color: #2E7D32;
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .jfb-title {
            font-size: 1.75rem;
            margin: 0 0 0.75rem 0;
            color: #1A237E;
            line-height: 1.2;
        }

        .jfb-intro {
            font-size: 1rem;
            margin: 0;
            color: #4A5568;
            line-height: 1.6;
        }

        /* --- SKILLS SECTION --- */
        .jfb-skills-section {
            padding: 3rem 1.5rem;
            background-color: #F4F7F4;
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 80px,
                rgba(76, 175, 80, 0.04) 80px,
                rgba(76, 175, 80, 0.04) 160px
            );
        }

        .jfb-tabs {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .jfb-tab {
            background: #FFFFFF;
            border: 2px solid transparent;
            color: #1A237E;
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .jfb-tab.jfb-active {
            background: #4CAF50;
            color: #FFFFFF;
            border-color: #388E3C;
        }

        .jfb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        /* --- PHOTO HIGHLIGHTS SECTION --- */
        .jfb-media-section {
            padding: 0 1.5rem 3.5rem;
            background-color: #F4F7F4;
        }

        .jfb-media-container {
            max-width: 980px;
            margin: 0 auto;
        }

        .jfb-media-title {
            margin: 0 0 0.75rem;
            text-align: center;
            color: #1A237E;
            font-size: 1.8rem;
        }

        .jfb-media-intro {
            margin: 0 auto 1.5rem;
            max-width: 680px;
            text-align: center;
            color: #4A5568;
            line-height: 1.6;
        }

        /* Container for the Widget to match the design style */
        .jfb-widget-card {
            background: #FFFFFF;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(26, 35, 126, 0.06);
            padding: 10px;
        }

        .jfb-media-actions {
            margin-top: 1.2rem;
            text-align: center;
        }

        .jfb-media-link {
            display: inline-block;
            background: #2E7D32;
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 999px;
            padding: 0.8rem 1.5rem;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        /* Desktop Responsiveness */
        @media (min-width: 768px) {
            .jfb-hero { height: 480px; display: block; }
            .jfb-hero-content { position: absolute; top: 50%; right: 5%; transform: translateY(-50%); width: 420px; margin: 0; padding: 2.5rem; }
            .jfb-media-section { padding: 0 3rem 4rem; }
        }
    </style>

    <!-- HERO AREA -->
    <div class="jfb-hero">
        <div class="jfb-football-decor" aria-hidden="true"></div>
        <div class="jfb-hero-img-container">
            <img class="jfb-hero-img" src="images/Jules-Football.jpg" alt="Jules playing football" />
        </div>
        <div class="jfb-hero-content">
            <span class="jfb-label">For my football friends</span>
            <h2 class="jfb-title">Jules' Football Skills</h2>
            <p class="jfb-intro">Hi! I love football. This page shows what I have learned and what I am practising.</p>
        </div>
    </div>

    <!-- SKILLS AREA -->
    <div class="jfb-skills-section">
        <div class="jfb-tabs" role="tablist">
            <button class="jfb-tab jfb-active" id="jfb-btn-learned" onclick="jfbSwitchTab('learned')">Skills I've learned</button>
            <button class="jfb-tab" id="jfb-btn-practising" onclick="jfbSwitchTab('practising')">What I'm practising</button>
        </div>
        <div class="jfb-grid" id="jfb-skills-grid" role="tabpanel"></div>
    </div>

    <!-- PHOTO HIGHLIGHTS AREA -->
    <div class="jfb-media-section">
        <div class="jfb-media-container">
            <h2 class="jfb-media-title">Photo Highlights</h2>
            <p class="jfb-media-intro">Swipe through the gallery below to see photos from match days and practice sessions.</p>

            <div class="jfb-widget-card">
                <!-- Public Album Widget -->
                <script src="https://cdn.jsdelivr.net/npm/publicalbum@latest/embed-ui.min.js" async></script>
                <div class="pa-gallery-player-widget" style="width:100%; height:480px; display:none;"
                    data-link="https://photos.app.goo.gl/dnJ1cSwGkhvMfb1WA"
                    data-title="Jules Football · Jun 7, 2025 – Mar 16, 2026 📸"
                    data-description="Shared album · Tap to view!">
                    <object data="https://lh3.googleusercontent.com/pw/AP1GczNWdcS-fQUZOBYCirZMeOyYCSOwghf75pkqYbGlJ45483JochQKAMGgvqszFw8e4hOx26x58rLjuI6sDV2SbU42YINtLb5gbjgRQRVSkj5MZdfU9c4F=w1920-h1080"></object>
                    <object data="https://lh3.googleusercontent.com/pw/AP1GczOwGSyF3AFfGXYvBKADVN9mPdx_t30tMlGIsxJAHSKoXL3oCivceUjWOs7C-0hhPmLYfWKcQLywc6uz2Pi1Fz4zDLF7wftoH_NGyEH7UUnldj9tTFoo=w1920-h1080"></object>
                    <object data="https://lh3.googleusercontent.com/pw/AP1GczPkGBP1bWsaDHidc6N6YsCbWkY0IkazaMoWkM2HVzwV7KrKVsw2KB-s62wg7sMHjEdu3TvvbzSjZ2YvS_zjVnvbZBp2075ZPDcqb78cB3F1_8gnQr2c=w1920-h1080"></object>
                    <object data="https://lh3.googleusercontent.com/pw/AP1GczPsvQ7Pj98SK8pCYQe4cKVt0bxgWFGSXgNi1FsoVSkYBcniMioqY-EPQUpQ7ZPVn8Ni9Wavfzn4CfBax9f7kkubVyAAhM74DVKcrsTPRGwQvi6PaWcU=w1920-h1080"></object>
                </div>
            </div>

            <div class="jfb-media-actions">
                <a class="jfb-media-link" href="https://photos.app.goo.gl/dnJ1cSwGkhvMfb1WA" target="_blank" rel="noopener noreferrer">Open full album</a>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        var jfbLearned = [
            { icon: "⚽", title: "Dribbling", note: "Keeping the ball close while running." },
            { icon: "👟", title: "Passing", note: "Using the inside of the foot for accuracy." }
        ];
        var jfbPractising = [
            { icon: "🎯", title: "Target Practice", note: "Hitting the corners of the goal." }
        ];

        function jfbSwitchTab(type) {
            const grid = document.getElementById('jfb-skills-grid');
            const learnedBtn = document.getElementById('jfb-btn-learned');
            const practBtn = document.getElementById('jfb-btn-practising');
            
            const data = (type === 'learned') ? jfbLearned : jfbPractising;
            
            learnedBtn.classList.toggle('jfb-active', type === 'learned');
            practBtn.classList.toggle('jfb-active', type === 'practising');
            
            grid.innerHTML = data.map(item => `
                <div class="jfb-card">
                    <div class="jfb-card-icon">${item.icon}</div>
                    <h3 class="jfb-card-title">${item.title}</h3>
                    <p class="jfb-card-note">${item.note}</p>
                </div>
            `).join('');
        }

        // Initialize
        window.onload = () => jfbSwitchTab('learned');
    </script>
</section>
